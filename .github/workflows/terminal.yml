name: Generate Terminal Portfolio

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install svg-term-cli
        run: npm install -g svg-term-cli

      - name: Create asciicast file
        run: |
          python3 << 'EOF'
          import json

          header = {
            "version": 2,
            "width": 80,
            "height": 24,
            "timestamp": 1700000000,
            "title": "Muhammad Abdullah — Cloud / DevOps Engineer"
          }

          events = [
            [0.5,  "o", "\r\n"],
            [0.8,  "o", "  \u001b[35m👨‍💻  Muhammad Abdullah\u001b[0m\r\n"],
            [1.0,  "o", "  \u001b[36mCloud / DevOps Engineer — Open to Work\u001b[0m\r\n"],
            [1.2,  "o", "\r\n"],
            [1.5,  "o", "\u001b[33m$ \u001b[0mcat skills.txt\r\n"],
            [2.0,  "o", "\r\n"],
            [2.1,  "o", "  ☁️  AWS        🏗️  Terraform      🐳  Docker\r\n"],
            [2.3,  "o", "  ⚙️  GitHub Actions            🚀  ECS Fargate\r\n"],
            [2.5,  "o", "  λ  Lambda     🗄️  RDS PostgreSQL  📨  SQS\r\n"],
            [2.7,  "o", "\r\n"],
            [3.0,  "o", "\u001b[33m$ \u001b[0mcat projects.txt\r\n"],
            [3.5,  "o", "\r\n"],
            [3.6,  "o", "  \u001b[35m🟣  StatusNest\u001b[0m   — Multi-Tenant AWS Monitoring SaaS   (2026)\r\n"],
            [3.8,  "o", "  \u001b[35m🟣  OrderFlow\u001b[0m    — Event-Driven Microservices Platform (2026)\r\n"],
            [4.0,  "o", "  \u001b[35m🟣  AI Hitman\u001b[0m    — Serverless Cloud Game Backend        (2025)\r\n"],
            [4.2,  "o", "\r\n"],
            [4.5,  "o", "\u001b[33m$ \u001b[0mcat contact.txt\r\n"],
            [5.0,  "o", "\r\n"],
            [5.1,  "o", "  📧  aaboodi679@gmail.com\r\n"],
            [5.3,  "o", "  💼  linkedin.com/in/muhammadabdullah-b887272a5\r\n"],
            [5.5,  "o", "  🐙  github.com/aboodi679\r\n"],
            [5.7,  "o", "\r\n"],
            [6.0,  "o", "  \u001b[32mOpen to Cloud / DevOps roles — Available Immediately\u001b[0m\r\n"],
            [6.2,  "o", "\r\n"],
            [6.5,  "o", "\u001b[33m$ \u001b[0m"],
          ]

          with open("terminal.cast", "w") as f:
            f.write(json.dumps(header) + "\n")
            for event in events:
              f.write(json.dumps(event) + "\n")

          print("asciicast file created successfully")
          EOF

      - name: Convert to SVG
        run: |
          svg-term --in terminal.cast --out profile-terminal.svg \
            --window \
            --width 80 \
            --height 24

      - name: Push SVG to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-terminal.svg
          git diff --cached --quiet || git commit -m "chore: update terminal portfolio"
          git push
